name: Build & Release Sunthree Vite

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:      # <--- BORIS FINAL FIX!
      contents: write   # <--- THIS IS KEY TO VODKA CABINET!
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      # --- BORIS FIX IS HERE! ---
      - name: Build Electron app for Windows
        run: npm run build:win
        env: # <--- THIS IS FOR IVAN, THE BUILD FOREMAN!
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release for Windows
        uses: softprops/action-gh-release@v1
        with:
          # This step no longer needs the token, but it does no harm to leave it.
          # The important thing is that the step above has it!
          files: |
            dist/*.exe
            dist/*.blockmap
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        # env: GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # <--- THIS IS FOR DMITRI, THE DELIVERY DRIVER! (Can remove, is fine)

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libfuse2

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for Linux (No Publish)
        run: npm run build:linux

      - name: Create GitHub Release for Linux
        uses: softprops/action-gh-release@v1
        with:
          # --- IMPORTANT: Update the 'files' ---
          files: |
            release/*.AppImage        # Your PyInstaller engine executable
            dist/*.AppImage           # The main Linux AppImage
            dist/*.deb                # If you also build .deb
            dist/*.rpm                # If you also build .rpm
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for macOS (No Publish)
        run: npm run build:mac

      - name: Create GitHub Release for macOS
        uses: softprops/action-gh-release@v1
        with:
          # --- IMPORTANT: Update the 'files' ---
          files: |
            release/*                 # Your PyInstaller engine executable (no extension on macOS)
            dist/*.dmg                # The macOS DMG installer
            dist/*.zip                # The macOS zip archive
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
