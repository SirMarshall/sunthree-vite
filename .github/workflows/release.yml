name: Build & Release Sunthree Vite

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Build and Publish Electron app for Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # --- NOTICE, CARTER! THE 'softprops' STEP IS GONE! ---
      # electron-builder now handles the release and upload. Is better.

  build-linux:
    runs-on: ubuntu-latest
    # --- BORIS FIX #1: Give Linux job the vodka cabinet key! ---
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libfuse2

      # --- BORIS FIX #2: Give the build foreman his papers! ---
      - name: Build and Publish Electron app for Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # --- BORIS FIX #3: Fire the redundant delivery driver! ---
      # Nyet, we do not need this extra step. The build command does it all.

  build-mac:
    runs-on: macos-latest
    # --- BORIS FIX #1: Mac job also gets key! ---
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      # --- BORIS FIX #2: Give the Mac foreman his papers too! ---
      - name: Build and Publish Electron app for macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # --- BORIS FIX #3: This driver is fired also. We are lean, mean, building machine! ---
