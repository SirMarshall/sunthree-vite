name: Build & Release Sunthree Vite

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for Windows (No Publish)
        # Use a specific npm script that builds but does not publish.
        # If 'npm run build:win' already has 'publish: never' in config, this is fine.
        # Otherwise, you might need a new script, e.g., "build:win-local": "npm run build && electron-builder --win --publish never"
        # For now, let's assume your existing 'build:win' is okay if we configure package.json.
        run: npm run build:win

      - name: Create GitHub Release for Windows
        uses: softprops/action-gh-release@v1
        with:
          # --- IMPORTANT: Update the 'files' to include electron-builder's output as well ---
          files: |
            release/*.exe             # Your PyInstaller engine executable
            dist/*.exe                # The main Windows installer (e.g., Sunthree Vite Setup 1.0.0.exe)
            dist/win-unpacked/**/*    # If you also want to attach the unpacked version
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libfuse2

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for Linux (No Publish)
        run: npm run build:linux

      - name: Create GitHub Release for Linux
        uses: softprops/action-gh-release@v1
        with:
          # --- IMPORTANT: Update the 'files' ---
          files: |
            release/*.AppImage        # Your PyInstaller engine executable
            dist/*.AppImage           # The main Linux AppImage
            dist/*.deb                # If you also build .deb
            dist/*.rpm                # If you also build .rpm
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run setup script (setup.sh)
        run: sh ./setup.sh

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for macOS (No Publish)
        run: npm run build:mac

      - name: Create GitHub Release for macOS
        uses: softprops/action-gh-release@v1
        with:
          # --- IMPORTANT: Update the 'files' ---
          files: |
            release/*                 # Your PyInstaller engine executable (no extension on macOS)
            dist/*.dmg                # The macOS DMG installer
            dist/*.zip                # The macOS zip archive
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
