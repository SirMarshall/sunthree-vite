name: Build & Release Sunthree Vite

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on tags like v1.0.0, v1.2.3, etc.

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Specify your Node.js version

      # --- NEW STEP: Run setup.sh to prepare both Node.js and Python environments ---
      # On Windows, GitHub Actions uses a bash-like shell by default, so 'sh' should work.
      # The script handles 'npm install' and 'python -m venv' and 'pip install'
      - name: Run setup script (setup.sh)
        run: sh ./setup.sh
      # --- END NEW STEP ---

      # Note: The 'postinstall' script from package.json (electron-builder install-app-deps)
      # will be run by the 'npm install' command within setup.sh.

      - name: Run prebuild script (build-engine.sh)
        # This will now find ./backend/venv/bin/pyinstaller because setup.sh ran previously.
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for Windows
        run: npm run build:win

      - name: Create GitHub Release for Windows
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --- NEW STEP: Run setup.sh ---
      - name: Run setup script (setup.sh)
        run: sh ./setup.sh
      # --- END NEW STEP ---

      - name: Install Linux build dependencies (e.g., libfuse2 for AppImage)
        # Keep this, as setup.sh won't install system-level packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libfuse2 # Or any other system deps for PyInstaller/AppImage

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for Linux
        run: npm run build:linux

      - name: Create GitHub Release for Linux
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.AppImage
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --- NEW STEP: Run setup.sh ---
      - name: Run setup script (setup.sh)
        run: sh ./setup.sh
      # --- END NEW STEP ---

      - name: Run prebuild script (build-engine.sh)
        run: sh ./scripts/build-engine.sh

      - name: Build Electron app for macOS
        run: npm run build:mac

      - name: Create GitHub Release for macOS
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.dmg
            release/*.zip
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
